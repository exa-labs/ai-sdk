version: 2
updates:
  # Keep SHA-pinned GitHub Actions current (security + maintenance).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Keep npm dependencies (and the committed lockfile) up to date.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
